<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020a0f;
      --card: rgba(0,220,255,0.04);
      --border: rgba(0,220,255,0.09);
      --accent: #00dcff;
      --accent2: #0070a8;
      --glow: rgba(0,220,255,0.35);
      --text: #e8faff;
      --muted: rgba(160,230,255,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      cursor: none !important;
    }

    #star-cursor {
      position: fixed;
      top: -100px; left: -100px;
      width: 24px; height: 24px;
      pointer-events: none;
      z-index: 999999;
      transform: translate(-50%, -50%);
      will-change: left, top;
    }
    #star-cursor svg {
      width: 100%; height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 4px #00dcff) drop-shadow(0 0 10px #00dcff);
      animation: starSpin 3s ease-in-out infinite;
    }
    @keyframes starSpin {
      0%,100% { transform: scale(1) rotate(0deg); }
      50%      { transform: scale(1.2) rotate(20deg); }
    }

    * { cursor: none !important; }

    #trail-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999998; }
    #bg-canvas    { position: fixed; inset: 0; z-index: 0; }

    body::after {
      content: ''; position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025; pointer-events: none;
    }

    .scene {
      position: relative; z-index: 2;
      height: 100vh; display: flex;
      align-items: center; justify-content: center;
      perspective: 900px;
    }

    .card {
      width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px 28px;
      backdrop-filter: blur(28px) saturate(180%);
      transform-style: preserve-3d;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      will-change: transform;
    }

    .top-row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }

    .avatar-wrap {
      position: relative; flex-shrink: 0;
      transform: translateZ(28px);
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--accent); object-fit: cover; display: block;
      box-shadow: 0 0 24px var(--glow);
    }
    .avatar-ring {
      position: absolute; inset: -6px; border-radius: 50%;
      border: 1.5px solid rgba(0,220,255,.22);
      animation: spin 8s linear infinite;
      pointer-events: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .info { transform: translateZ(18px); }
    .username {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 20%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .status {
      margin-top: 4px; font-family: 'DM Mono', monospace;
      font-size: .72rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.6; transform:scale(.85); }
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 22px;
    }

    .player-row {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 26px; transform: translateZ(22px);
    }
    .vinyl-wrap { position: relative; width: 78px; height: 78px; flex-shrink: 0; }
    .vinyl {
      width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(
        #00131a 0deg,#001e2a 30deg,#00131a 60deg,#001e2a 90deg,
        #00131a 120deg,#001e2a 150deg,#00131a 180deg,#001e2a 210deg,
        #00131a 240deg,#001e2a 270deg,#00131a 300deg,#001e2a 330deg,#00131a 360deg
      );
      border: 2px solid rgba(0,220,255,.1);
      box-shadow: 0 0 30px rgba(0,0,0,.8), 0 0 0 1px rgba(0,220,255,.12);
      position: relative;
      animation: vinylSpin 4s linear infinite paused;
    }
    .vinyl.playing { animation-play-state: running; }
    @keyframes vinylSpin { to { transform: rotate(360deg); } }
    .vinyl::before {
      content: ''; position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      width: 22px; height: 22px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, var(--accent2) 60%, #001e2a 100%);
      box-shadow: 0 0 12px var(--glow);
    }
    .vinyl::after {
      content: ''; position: absolute; inset: 8px; border-radius: 50%;
      border: 1px solid rgba(0,220,255,.06);
      box-shadow: 0 0 0 4px rgba(0,220,255,.04), 0 0 0 8px rgba(0,220,255,.025),
                  0 0 0 14px rgba(0,220,255,.015);
    }

    .track-info { flex: 1; min-width: 0; }
    .track-title { font-size: .95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); margin-top: 3px; }
    .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .ctrl-btn {
      background: none; border: none;
      color: var(--muted); padding: 0; line-height: 1;
      transition: color .2s, transform .15s;
    }
    .ctrl-btn:hover { color: var(--accent); transform: scale(1.15); }
    .ctrl-btn svg { width: 18px; height: 18px; display: block; }
    .ctrl-btn.play-btn { color: var(--accent); }

    .progress-wrap {
      margin-top: 10px; height: 3px;
      background: rgba(0,220,255,.1); border-radius: 99px;
      position: relative; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: var(--accent); border-radius: 99px;
      transition: width .5s linear; box-shadow: 0 0 8px var(--accent);
    }
    .volume-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .volume-icon { color: var(--muted); flex-shrink: 0; }
    .volume-icon svg { width: 13px; height: 13px; }
    input[type=range] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: rgba(0,220,255,.12); border-radius: 99px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--glow);
    }

    .socials-label {
      font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 10px; transform: translateZ(10px);
    }
    .socials { display: flex; flex-direction: column; gap: 8px; transform: translateZ(14px); }
    .social-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 12px;
      background: rgba(0,220,255,.025); border: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      font-size: .85rem; font-weight: 700;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
    }
    .social-link:hover {
      background: rgba(0,220,255,.07); border-color: rgba(0,220,255,.35);
      transform: translateX(4px); box-shadow: 0 0 20px rgba(0,220,255,.1);
    }
    .social-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .social-icon svg { width: 16px; height: 16px; }
    .social-icon.namemc  { background: rgba(76,175,80,.15); }
    .social-icon.namemc  svg { fill: #4caf50; }
    .social-icon.discord { background: rgba(88,101,242,.18); }
    .social-icon.discord svg { fill: #5865f2; }
    .social-icon.telegram { background: rgba(0,220,255,.12); }
    .social-icon.telegram svg { fill: var(--accent); }
    .social-sub { margin-left: auto; font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); }

    .footer {
      margin-top: 22px; text-align: center;
      font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); letter-spacing: .05em;
    }
  </style>
</head>
<body>

<div id="star-cursor">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#00dcff"/>
  </svg>
</div>

<canvas id="trail-canvas"></canvas>
<canvas id="bg-canvas"></canvas>

<div class="scene">
  <div class="card" id="card">

    <div class="top-row">
      <div class="avatar-wrap">
        <img class="avatar" id="avatarImg"
          src="https://api.dicebear.com/7.x/shapes/svg?seed=profile&backgroundColor=001e2a"

        <div class="avatar-ring"></div>

          <button class="ctrl-btn" onclick="nextTrack()">

        </div>
        <div class="volume-row">
          <span class="volume-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </span>

    </div>

    <div class="divider"></div>

    <div class="socials-label">Socials</div>
    <div class="socials">
      <a class="social-link" id="namemcLink" href="#" target="_blank">
        <div class="social-icon namemc">
          <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6zm2 2h2v3l4-3v8l-4-3v3H8V8z"/></svg>
        </div>
        <span>NameMC</span>
        <span class="social-sub" id="namemcUser">YourName</span>
      </a>
      <a class="social-link" id="discordLink" href="#" target="_blank">
        <div class="social-icon discord">
          <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </div>
        <span>Discord</span>
        <span class="social-sub" id="discordUser">user#0000</span>
      </a>
      <a class="social-link" id="telegramLink" href="#" target="_blank">
        <div class="social-icon telegram">
          <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        </div>
        <span>Telegram</span>
        <span class="social-sub" id="telegramUser">@YourUsername</span>
      </a>
    </div>

    <div class="footer">✦ &nbsp;profile &nbsp;✦</div>
  </div>
</div>

<audio id="audioEl" loop></audio>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIG – HIER ANPASSEN
━━━━━━━━━━━━━━━━━━━━━━━━ */
const CONFIG = {
  username:  "zyro",
  status:    "online",
  profilePicture: "cat3.jpg", 
  namemc:    "lange",
  discord:   "zyrolein",
  discordId: "304354137192267777",
  telegram:  "z390111",
  tracks: [
    { title: "Song Name", artist: "Artist", src: "https://files.fm/u/hc78dnxwbm" },
    { title: "Song 2",    artist: "Artist", src: "" },
  ]
};
/* ━━━━━━━━━━━━━━━━━━━━━━━━ */

document.getElementById('usernameEl').textContent   = CONFIG.username;
document.getElementById('statusText').textContent   = CONFIG.status;
document.getElementById('namemcUser').textContent   = CONFIG.namemc;
document.getElementById('namemcLink').href          = `https://namemc.com/profile/${CONFIG.namemc}`;
document.getElementById('discordUser').textContent  = CONFIG.discord;
document.getElementById('discordLink').href         = `https://discord.com/users/${CONFIG.discordId}`;
document.getElementById('telegramUser').textContent = `@${CONFIG.telegram}`;
document.getElementById('telegramLink').href        = `https://t.me/${CONFIG.telegram}`;

// Profilbild setzen
if (CONFIG.profilePicture && CONFIG.profilePicture.trim() !== '') {
  document.getElementById('avatarImg').src = CONFIG.profilePicture;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   STAR CURSOR
━━━━━━━━━━━━━━━━━━━━━━━━ */
const starEl = document.getElementById('star-cursor');
let mouseX = -200, mouseY = -200;

function updateCursor() {
  starEl.style.left = mouseX + 'px';
  starEl.style.top  = mouseY + 'px';
  requestAnimationFrame(updateCursor);
}
updateCursor();

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
}, { passive: true });

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   PARTICLE TRAIL
━━━━━━━━━━━━━━━━━━━━━━━━ */
const trailCanvas = document.getElementById('trail-canvas');
const tCtx = trailCanvas.getContext('2d');

function resizeCanvases() {
  trailCanvas.width  = innerWidth;
  trailCanvas.height = innerHeight;
  bgCanvas.width     = innerWidth;
  bgCanvas.height    = innerHeight;
}

const CYAN = '#00dcff';
const trail = [];

class Spark {
  constructor(x, y) {
    this.x     = x + (Math.random() - .5) * 8;
    this.y     = y + (Math.random() - .5) * 8;
    this.vx    = (Math.random() - .5) * 1.5;
    this.vy    = (Math.random() - .5) * 1.5 - .6;
    this.life  = 1;
    this.decay = Math.random() * .028 + .02;
    this.size  = Math.random() * 5 + 1.5;
    this.type  = Math.random();
  }
  step() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.045;
    this.life -= this.decay;
    this.size *= 0.974;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = this.life;
    ctx.shadowBlur  = 12;
    ctx.shadowColor = CYAN;
    if (this.type < .4) {
      drawStarShape(ctx, this.x, this.y, 5, this.size, this.size * .42);
      ctx.fillStyle = CYAN;
      ctx.fill();
    } else if (this.type < .72) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * .5, 0, Math.PI * 2);
      ctx.fillStyle = CYAN;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * .52, 0, Math.PI * 2);
      ctx.strokeStyle = CYAN;
      ctx.lineWidth = .9;
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }
}

function drawStarShape(ctx, cx, cy, pts, outer, inner) {
  let rot = -Math.PI / 2;
  const step = Math.PI / pts;
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    ctx.lineTo(cx + Math.cos(rot) * r, cy + Math.sin(rot) * r);
    rot += step;
  }
  ctx.closePath();
}

let frameCount = 0;
function trailLoop() {
  tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  frameCount++;
  if (frameCount % 2 === 0) {
    for (let i = 0; i < 4; i++) trail.push(new Spark(mouseX, mouseY));
  }
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].step();
    trail[i].draw(tCtx);
    if (trail[i].life <= 0 || trail[i].size < .25) trail.splice(i, 1);
  }
  tCtx.globalAlpha = 1;
  requestAnimationFrame(trailLoop);
}
trailLoop();

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   BG AMBIENT PARTICLES
━━━━━━━━━━━━━━━━━━━━━━━━ */
const bgCanvas = document.getElementById('bg-canvas');
const bCtx = bgCanvas.getContext('2d');
const bgDots = [];

resizeCanvases();
window.addEventListener('resize', resizeCanvases);

class BgDot {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * innerWidth;
    this.y  = init ? Math.random() * innerHeight : innerHeight + 5;
    this.r  = Math.random() * 1.2 + .3;
    this.s  = Math.random() * .4 + .1;
    this.o  = Math.random() * .4 + .1;
    this.dx = (Math.random() - .5) * .15;
  }
  step() {
    this.y -= this.s; this.x += this.dx;
    if (this.y < -5) this.reset(false);
  }
  draw() {
    bCtx.globalAlpha = this.o;
    bCtx.fillStyle   = CYAN;
    bCtx.beginPath();
    bCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    bCtx.fill();
  }
}
for (let i = 0; i < 65; i++) bgDots.push(new BgDot());

function bgLoop() {
  bCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const g = bCtx.createRadialGradient(innerWidth/2, innerHeight/2, 0, innerWidth/2, innerHeight/2, innerWidth * .55);
  g.addColorStop(0,   'rgba(0,180,220,.1)');
  g.addColorStop(.6,  'rgba(0,80,120,.04)');
  g.addColorStop(1,   'transparent');
  bCtx.globalAlpha = 1;
  bCtx.fillStyle = g;
  bCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgDots.forEach(p => { p.step(); p.draw(); });
  requestAnimationFrame(bgLoop);
}
bgLoop();

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   3D TILT
━━━━━━━━━━━━━━━━━━━━━━━━ */
const card  = document.getElementById('card');
const scene = card.parentElement;
let mx = 0, my = 0;

document.addEventListener('mousemove', e => {
  const r = scene.getBoundingClientRect();
  mx = (e.clientX - (r.left + r.width  / 2)) / (r.width  / 2);
  my = (e.clientY - (r.top  + r.height / 2)) / (r.height / 2);
}, { passive: true });

(function tilt() {
  card.style.transform = `rotateY(${mx * 14}deg) rotateX(${-my * 10}deg) scale3d(1.02,1.02,1.02)`;
  card.style.boxShadow = `${-mx*20}px ${-my*14}px 60px rgba(0,220,255,.2), 0 32px 80px rgba(0,0,0,.7)`;
  requestAnimationFrame(tilt);
})();

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   AUDIO PLAYER
━━━━━━━━━━━━━━━━━━━━━━━━ */
const audio    = document.getElementById('audioEl');
const playIcon = document.getElementById('playIcon');
const vinyl    = document.getElementById('vinyl');
let idx = 0, playing = false;

function loadTrack(i) {
  const t = CONFIG.tracks[i];
  document.getElementById('trackTitle').textContent  = t.title;
  document.getElementById('trackArtist').textContent = t.artist;
  audio.src = t.src || '';
  if (t.src && playing) audio.play();
}
loadTrack(0);
audio.volume = 0.7;

function togglePlay() {
  if (!CONFIG.tracks[idx].src) return;
  playing = !playing;
  playing ? audio.play() : audio.pause();
  vinyl.classList.toggle('playing', playing);
  playIcon.innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}
function nextTrack() { idx = (idx + 1) % CONFIG.tracks.length; loadTrack(idx); }
function prevTrack() { idx = (idx - 1 + CONFIG.tracks.length) % CONFIG.tracks.length; loadTrack(idx); }
function setVolume(v) { audio.volume = v; }
function seekAudio(e) {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}
audio.addEventListener('timeupdate', () => {
  if (audio.duration)
    document.getElementById('progressBar').style.width =
      (audio.currentTime / audio.duration * 100) + '%';
});
audio.addEventListener('ended', nextTrack);
</script>
</body>
</html>
